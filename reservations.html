<h1 class="reservationsheading">Reserve Your Table</h1>
<h2 class="reservationsh2">Please note there are no walk-ins!</h2>
<div class="reservation-container">
    <h2 class="resheading">Book Your Visit</h2>
      <form action="reservation-complete.html" method="POST">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="Enter your name" required>

        <label for="res_date">Date</label>
          <select id="res_date" name="res_date">
            <option value="03-04-2026">03-04-2026 (Friday 3rd April)</option>
            <option value="03-07-2026">03-07-2026 (Friday 7th July)</option>
            <option value="25-08-2026">25-08-2026 (Friday 25th August)</option>
            <option value="18-12-2026">18-12-2026 (Friday 18th December)</option>
          </select>

        <label for="guests">Number of Guests</label>
        <select id="guests" name="guests">
            <option value="1">1 Person</option>
            <option value="2">2 People</option>
            <option value="3">3 People</option>
            <option value="4">4 People</option>
            <option value="5">5 People</option>
            <option value="6+">6+ People</option>
        </select>

        <label for="res_time">Time</label>
        <select id="res_time" name="res_time" required>
          <option>18:00</option>
          <option>18:45</option>
          <option>19:30</option>
          <option>20:15</option>
          <option>21:00</option>
        </select>        
        
        <label for="contactnumber">Contact Number</label>
        <input type="tel" id="contactnumber" name="contactnumber" placeholder="Enter your contact number" pattern="[0-9]*" inputmode="numeric" title="Please enter a valid phone number in the format: 021345678" required>
        
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>

        <div class="dietary-group">
        <label>Do you have dietary restrictions?</label><br>

        <label>
        <input type="radio" name="dietary" value="Yes" onclick="toggleDietary(true)" required>
        Yes
        </label>

        <label>
        <input type="radio" name="dietary" value="No" onclick="toggleDietary(false)">
        No
        </label>
        </div><br>

        <input type="text" id="dietaryBox" placeholder="Please specify your dietary restrictions" style="display:none;">

<script>
function toggleDietary(show) {
  document.getElementById("dietaryBox").style.display = show ? "block" : "none";
}
</script>
        <button type="submit" id="button">Submit Reservation</button>
    </form>
